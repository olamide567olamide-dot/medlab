<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - iMEDIC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2b7a9d;
            --primary-dark: #1f5a7a;
            --accent-blue: #6bb3d4;
            --light-bg: #f5f9fb;
            --white: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --transition: all 0.3s ease;
            --success-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background: linear-gradient(135deg, #f5f9fb 0%, #e8f4f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .forgot-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
            padding: 3rem 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .back-link:hover {
            gap: 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
            background-color: var(--light-bg);
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(43, 122, 157, 0.1);
        }

        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        input.error {
            border-color: #dc2626;
            background-color: rgba(220, 38, 38, 0.05);
        }

        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(43, 122, 157, 0.3);
        }

        .success-message {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            padding: 1.2rem;
            border-radius: 10px;
            text-align: center;
            margin-top: 1rem;
        }

        .success-message.show {
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .forgot-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <a href="login.html" class="back-link">← Back to Login</a>

        <div class="header">
            <div class="logo">iMEDIC 🩺</div>
            <h1>Reset Password</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <div class="form-group">
            <label for="resetEmail">Email Address</label>
            <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
            <div class="error-message" id="resetEmailError">Please enter a valid email address</div>
        </div>

        <button id="sendResetBtn" class="reset-btn">Send Reset Link</button>

        <div id="successMessage" class="success-message">
            ✅ A password reset link has been sent to your email address.<br>
            <small>Please check your inbox (and spam folder).</small>
        </div>

        <div class="login-link">
            Remember your password? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const resetEmailInput = document.getElementById('resetEmail');
        const resetEmailError = document.getElementById('resetEmailError');
        const sendResetBtn = document.getElementById('sendResetBtn');
        const successMessage = document.getElementById('successMessage');

        // Email validation
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Real-time validation
        resetEmailInput.addEventListener('input', function() {
            this.classList.remove('error');
            resetEmailError.classList.remove('show');
        });

        // Send reset link (calls backend)
        sendResetBtn.addEventListener('click', async function() {
            const email = resetEmailInput.value.trim();

            if (!email || !validateEmail(email)) {
                resetEmailInput.classList.add('error');
                resetEmailError.classList.add('show');
                return;
            }

            const originalText = sendResetBtn.textContent;
            sendResetBtn.textContent = 'Sending...';
            sendResetBtn.disabled = true;

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.classList.add('show');
                    sendResetBtn.style.display = 'none';
                } else {
                    resetEmailInput.classList.add('error');
                    resetEmailError.textContent = data.message || 'Unable to send reset link. Please try again.';
                    resetEmailError.classList.add('show');
                }
            } catch (e) {
                resetEmailInput.classList.add('error');
                resetEmailError.textContent = 'Network error. Please make sure the server is running at http://localhost:3000';
                resetEmailError.classList.add('show');
            } finally {
                sendResetBtn.textContent = originalText;
                sendResetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
