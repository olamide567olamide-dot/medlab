<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Reset Password - iMEDIC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-color: #2b7a9d;
      --primary-dark: #1f5a7a;
      --light-bg: #f5f9fb;
      --white: #ffffff;
      --text-dark: #333333;
      --text-light: #666666;
      --border-color: #e0e0e0;
      --transition: all 0.3s ease;
      --success-color: #10b981;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-dark);
      line-height: 1.6;
      background: linear-gradient(135deg, #f5f9fb 0%, #e8f4f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      max-width: 450px;
      width: 100%;
      padding: 3rem 2rem;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: .5rem; }
    p { color: var(--text-light); font-size: .95rem; }
    .form-group { margin: 1.2rem 0; }
    label { display:block; margin-bottom:.6rem; font-weight:600; }
    input[type="password"]{
      width:100%; padding:1rem; border:2px solid var(--border-color); border-radius:10px;
      font-size:1rem; font-family:inherit; transition:var(--transition); background-color:var(--light-bg);
    }
    input[type="password"]:focus{
      outline:none; border-color:var(--primary-color); background-color:var(--white);
      box-shadow:0 0 0 4px rgba(43,122,157,.1);
    }
    .error { border-color:#dc2626 !important; background-color:rgba(220,38,38,.05) !important; }
    .error-message { color:#dc2626; font-size:.85rem; margin-top:.5rem; display:none; }
    .error-message.show { display:block; }
    .btn{
      width:100%; padding:1rem; background:linear-gradient(135deg,var(--primary-color) 0%, var(--primary-dark) 100%);
      color:var(--white); border:none; border-radius:10px; font-weight:700; font-size:1rem; cursor:pointer;
      transition:var(--transition); margin-top:.6rem;
    }
    .btn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 10px 30px rgba(43,122,157,.3); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .success-message{
      display:none; background:rgba(16,185,129,.1); color:var(--success-color);
      padding:1.2rem; border-radius:10px; text-align:center; margin-top:1rem;
    }
    .success-message.show{ display:block; }
    .back { display:block; text-align:center; margin-top:1.5rem; }
    .back a { color:var(--primary-color); text-decoration:none; font-weight:600; }
    .back a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">iMEDIC 🩺</div>
      <h1>Set a new password</h1>
      <p>Choose a strong password for your account.</p>
    </div>

    <div class="form-group">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="Enter new password" required />
      <div class="error-message" id="newPasswordError">Password must be at least 8 characters</div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
      <div class="error-message" id="confirmPasswordError">Passwords do not match</div>
    </div>

    <div class="error-message" id="apiError"></div>

    <button class="btn" id="resetBtn">Reset password</button>

    <div id="successMessage" class="success-message">
      ✅ Password reset successful. You can now log in.
    </div>

    <div class="back"><a href="login.html">Back to login</a></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const email = params.get('email') || '';

    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const newPasswordError = document.getElementById('newPasswordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');
    const apiError = document.getElementById('apiError');
    const resetBtn = document.getElementById('resetBtn');
    const successMessage = document.getElementById('successMessage');

    function validatePassword(pw){ return typeof pw === 'string' && pw.length >= 8; }

    function clearErrors(){
      [newPassword, confirmPassword].forEach(i => i.classList.remove('error'));
      [newPasswordError, confirmPasswordError, apiError].forEach(e => e.classList.remove('show'));
    }

    newPassword.addEventListener('input', clearErrors);
    confirmPassword.addEventListener('input', clearErrors);

    resetBtn.addEventListener('click', async () => {
      clearErrors();

      if (!token || !email) {
        apiError.textContent = 'Invalid or missing reset token. Please request a new reset link.';
        apiError.classList.add('show');
        return;
      }

      const pw = newPassword.value;
      const cpw = confirmPassword.value;

      let ok = true;
      if (!validatePassword(pw)) {
        newPassword.classList.add('error');
        newPasswordError.classList.add('show');
        ok = false;
      }
      if (pw !== cpw) {
        confirmPassword.classList.add('error');
        confirmPasswordError.classList.add('show');
        ok = false;
      }
      if (!ok) return;

      const originalText = resetBtn.textContent;
      resetBtn.textContent = 'Resetting...';
      resetBtn.disabled = true;

      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword: pw })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          successMessage.classList.add('show');
          resetBtn.style.display = 'none';
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          apiError.textContent = data.message || 'Unable to reset password. Please request a new reset link.';
          apiError.classList.add('show');
        }
      } catch (e) {
        apiError.textContent = 'Network error. Please make sure the server is running at http://localhost:3000';
        apiError.classList.add('show');
      } finally {
        resetBtn.textContent = originalText;
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
